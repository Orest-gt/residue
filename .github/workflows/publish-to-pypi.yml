name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Pre-warm cibuildwheel cache (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p C:\Users\runneradmin\AppData\Local\pypa\cibuildwheel\Cache
          curl -L --retry 5 "https://github.com/pypa/get-virtualenv/raw/20.27.1/public/virtualenv.pyz" -o "C:\Users\runneradmin\AppData\Local\pypa\cibuildwheel\Cache\virtualenv-20.27.1.pyz"
        shell: bash

      - name: Pre-warm cibuildwheel cache (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cache/cibuildwheel
          curl -L --retry 5 "https://github.com/pypa/get-virtualenv/raw/20.27.1/public/virtualenv.pyz" -o ~/.cache/cibuildwheel/virtualenv-20.27.1.pyz
        shell: bash

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32 pp*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
